<html>

<head>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Avenir Next", "Avenir", "Segoe UI", "Lucida Grande", "Helvetica Neue", "Helvetica", "Fira Sans", "Roboto", "Noto", "Droid Sans", "Cantarell", "Oxygen", "Ubuntu", "Franklin Gothic Medium", "Century Gothic", "Liberation Sans", sans-serif;
            font-size: 1.2rem;
            color: black;
            background-color: white;
            user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            margin: 0;
            overflow: hidden;
        }

        .flip-icon-horiz {
            transform: rotate(180deg);
        }

        .content-section {
            pointer-events: none;

            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-color: black transparent;
            scrollbar-width: auto;

            box-sizing: border-box;
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 8px;

            opacity: 0;
            visibility: hidden;

            transform: translateX(-30px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
        }

        .content-section.active {
            pointer-events: auto;

            opacity: 1;
            visibility: visible;
            display: block;

            transform: translateX(0);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
        }

        .browse-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .path-container {
            display: flex;
            align-items: center;
            flex: 9999 1 300px;
            gap: 10px;
            width: 100%;
        }

        .path-label {
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-color: black transparent;
            scrollbar-width: auto;
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 8px;
            white-space: nowrap;
            user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
        }

        .nav-btn {
            border-radius: 5px;
            padding: 8px;
            fill: gray;
        }

        .nav-btn.enabled {
            fill: black;
        }

        .nav-btn.enabled:hover {
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0.2);
            transition: transform ease 0.15s, background-color ease 0.15s;
        }

        .nav-btn.enabled:hover svg {
            transform: scale(1.05);
            transition: transform ease 0.15s, background-color ease 0.15s;
        }

        .nav-btn.enabled:active svg {
            transform: scale(0.9);
            transition: transform ease 0.1s, background-color ease 0.1s;
        }

        .normal-btn {
            font-size: 1rem;
            border-radius: 3px;
            background-color: #2570d1;
            color: white;
            padding: 10px 40px;
            outline: none;
            border: 1px rgb(0, 56, 160) solid;
            transition: background-color ease 0.15s;
        }

        .normal-btn:hover {
            cursor: pointer;
            background-color: #4d91e9;
            transition: background-color ease 0.15s;
        }

        .normal-btn:active {
            background-color: #244a7a;
            transition: background-color ease 0.1s;
        }

        .table-container-panel {
            display: none;
            flex-direction: column;
        }

        .table-container {
            overflow-y: hidden;
            overflow-x: auto;
            scrollbar-color: black transparent;
            scrollbar-width: auto;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #4d4c4c;
            margin: 0 20px 0;
        }

        .grid-table {
            display: grid;
            background-color: white;
            min-width: 400px;
        }

        .grid-row {
            display: contents;
        }

        .grid-header {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 600;
            text-align: center;
            padding: 16px;
            border-bottom: 2px solid #696969;
            border-right: 1px solid #696969;
        }

        .grid-header:last-child {
            border-right: none;
        }

        .grid-cell {
            display: flex;
            align-items: center;
            padding: 16px;
            color: #333;
            transition: background-color 0.15s ease;
        }

        .grid-cell.center-cell {
            justify-content: center;
        }

        .grid-row .grid-cell {
            border-bottom: 1px solid #4d4c4c;
        }

        .grid-row:last-child .grid-cell {
            border-bottom: none;
        }

        .grid-row.normal .grid-cell {
            transition: background-color 0.15s ease;
        }

        .grid-row.normal:nth-child(even) .grid-cell {
            background-color: #f3f3f3;
        }

        .grid-row.error .grid-cell {
            background-color: #eba4a4;
            transition: background-color 0.15s ease;
        }

        .grid-row.error:nth-child(even) .grid-cell {
            background-color: #e59393;
        }

        .grid-row.enabled:hover:not(:has(.action-btn:hover)) .grid-cell {
            cursor: pointer;
            background-color: #dddddd;
            transition: background-color 0.15s ease;
        }

        .grid-row.enabled:active:not(:has(.action-btn:active)) .grid-cell {
            background-color: #cccccc;
            transition: background-color 0.1s ease;
        }

        .grid-row.enabled.error:hover:not(:has(.action-btn:hover)) .grid-cell {
            background-color: #f1bbbb;
            transition: background-color 0.15s ease;
        }

        .grid-row.enabled.error:active:not(:has(.action-btn:active)) .grid-cell {
            background-color: #d38787;
            transition: background-color 0.1s ease;
        }

        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .badge.infix {
            background: #b8a3ed;
            color: #5b38bc;
            border: 1px #5b38bc solid;
        }

        .badge.postfix {
            background: #b5bef2;
            color: #2e43ba;
            border: 1px #2e43ba solid;
        }

        .actions-container {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px transparent solid;
        }

        .move-up-action,
        .move-down-action {
            background-color: #5e7296;
        }

        .move-up-action.enabled,
        .move-down-action.enabled {
            background-color: #518bf7;
            border: 1px #305cad solid;
            transition: background-color 0.15s ease;
        }

        .move-up-action.enabled:hover,
        .move-down-action.enabled:hover {
            cursor: pointer;
            background-color: #7ba5f2;
            transition: background-color 0.15s ease;
        }

        .move-up-action.enabled:active,
        .move-down-action.enabled:active {
            background-color: #305cad;
            transition: background-color 0.1s ease;
        }

        .add-action {
            background-color: #55836c;
        }

        .add-action.enabled,
        .confirm-action {
            background-color: #0dc267;
            border: 1px #109150 solid;
            transition: background-color 0.15s ease;
        }

        .add-action.enabled:hover,
        .confirm-action:hover {
            cursor: pointer;
            background-color: #39db8a;
            transition: background-color 0.15s ease;
        }

        .add-action.enabled:active,
        .confirm-action:active {
            background-color: #109150;
            transition: background-color 0.1s ease;
        }

        .edit-action {
            background-color: #f9ff41;
            border: 1px #aeb23a solid;
            transition: background-color 0.15s ease;
        }

        .edit-action:hover {
            cursor: pointer;
            background-color: #fcffaf;
            transition: background-color 0.15s ease;
        }

        .edit-action:active {
            background-color: #d1d643;
            transition: background-color 0.1s ease;
        }

        .delete-action,
        .cancel-action {
            background-color: #e03a3a;
            border: 1px #af2b2b solid;
            transition: background-color 0.15s ease;
        }

        .delete-action:hover,
        .cancel-action:hover {
            cursor: pointer;
            background-color: #ed7676;
            transition: background-color 0.15s ease;
        }

        .delete-action:active,
        .cancel-action:active {
            background-color: #af2b2b;
            transition: background-color 0.1s ease;
        }

        input.normal-input {
            width: 100%;
            padding: 12px 16px;

            border: 1px solid #d1d5db;
            border-radius: 8px;

            font-size: 1.1rem;
            color: #1f2937;

            background-color: #ffffff;
            outline: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);

            transition: border-color 0.15s ease, box-shadow 0.15 ease;
        }

        input.normal-input:hover {
            border-color: #9ca3af;
            transition: border-color 0.15s ease, box-shadow 0.15 ease;
        }

        input.normal-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transition: border-color 0.1s ease, box-shadow 0.1 ease;
        }

        input.normal-input::placeholder {
            color: #9ca3af;
        }

        select.normal-select {
            cursor: pointer;

            appearance: none;
            -webkit-appearance: none;

            width: 100%;
            padding: 12px 16px;

            border: 1px solid #d1d5db;
            border-radius: 8px;

            font-size: 1.1rem;
            color: #1f2937;

            background-color: #ffffff;
            outline: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);

            transition: border-color 0.15s ease, box-shadow 0.15 ease;
        }

        select.normal-select:hover {
            border-color: #9ca3af;
            transition: border-color 0.15s ease, box-shadow 0.15 ease;
        }

        select.normal-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transition: border-color 0.1s ease, box-shadow 0.1 ease;
        }

        .add-new-entry {
            margin: 0 20px 5px;
            padding: 25.5px 16px;
            border-radius: 0 0 6px 6px;
            color: #696969;
            border-width: 0 2px 2px;
            border-color: #696969;
            border-style: dashed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: color 0.2s ease, bborder-color 0.2s ease, background-color 0.2s ease;
        }

        .add-new-entry:hover {
            cursor: pointer;
            border-color: transparent;
            color: #4d4d4d;
            background-color: #dddddd;
            transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .add-new-entry:active {
            background-color: #cccccc;
            transition: color 0.1s ease, border-color 0.1s ease, background-color 0.1s ease;
        }

        .error-panel {
            display: none;
            animation: fade 0.15s ease forwards;
            font-size: 1rem;
            border-radius: 6px;
            background-color: #db5050;
            border: 3px #741212 solid;
            color: #290505;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: opacity 0.15s ease;
        }

        .error-panel.show {
            display: flex;
            gap: 10px;
            animation: fade 0.15s ease reverse forwards;
        }

        @keyframes fade {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .error-header-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            margin-top: 9px;
            gap: 4px;
        }

        .error-header-container.horiz {
            flex-direction: row;
        }

        .error-title {
            display: flex;
            gap: 4px;
        }

        .error-icon {
            display: flex;
            justify-content: center;
        }

        .error-list {
            max-height: 100px;
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-color: black transparent;
            scrollbar-width: auto;
        }

        .header {
            display: flex;
            align-items: safe center;
            gap: 6px;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .close-nav-bar {
            border: 2px black solid;
            border-radius: 6px;
            padding: 5px;
        }

        .nav-bar {
            display: flex;
            align-items: safe center;
            flex-grow: 1;
            gap: 3px;
            border: 2px black solid;
            border-radius: 6px;
            padding: 5px 10px;
        }

        .info-bar {
            display: flex;
            justify-content: safe center;
            align-items: safe center;
            gap: 6px;
            flex-grow: 1;
        }

        .expr {
            display: flex;
            gap: 8px;
            padding: 3px;
        }

        .postfix-expr-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
        }

        .divider-container {
            display: none;
            height: 60%;
            align-items: safe center;
            justify-content: safe center;
            font-size: 1.3rem;
        }

        .divider-container.show {
            display: flex;
        }

        .sizer {
            width: 40%;
        }

        .internal-divider {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stack-container {
            border-radius: 0 0 3px 3px;
            box-sizing: border-box;
            padding: 6px 6px;
            width: 50%;
            display: flex;
            flex-direction: column-reverse;
            gap: 6px;
            border-left: 2px black solid;
            border-right: 2px black solid;
            border-bottom: 2px black solid;
        }

        .stack {
            text-align: center;
            border-radius: 3px;

            background-color: #03dfff;

            overflow-wrap: break-word;

            opacity: 1;
            visibility: visible;

            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .stack.highlight {
            animation: outline-flicker 0.6s infinite alternate;
        }

        @keyframes outline-flicker {

            0%,
            49.9% {
                outline: 0;
            }

            50%,
            100% {
                outline: 2px red solid;
            }
        }

        .stack.invisible {
            opacity: 0;
            visibility: hidden;

            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .token-operator {
            padding: 2px;
            color: #0f00da;
        }

        .token-operand {
            padding: 2px;
            color: #ffa826;
        }

        .grid-row .token-operator {
            text-shadow:
                -1px -1px 0 white,
                0 -1px 0 white,
                1px -1px 0 white,
                1px 0 0 white,
                1px 1px 0 white,
                0 1px 0 white,
                -1px 1px 0 white,
                -1px 0 0 white;
        }

        .grid-row .token-operand {
            text-shadow:
                -1px -1px 0 black,
                0 -1px 0 black,
                1px -1px 0 black,
                1px 0 0 black,
                1px 1px 0 black,
                0 1px 0 black,
                -1px 1px 0 black,
                -1px 0 0 black;
        }

        .token-operator.token-highlight,
        .token-operand.token-highlight {
            border-radius: 4px;
            outline: 3px green solid;
        }

        #path-refresh-btn-id,
        #path-close-btn-id {
            display: none;
        }

        #open-csv-btn-id {
            flex-grow: 1;
        }

        #csv-error-panel-id {
            margin: 25px 20px 0px;
        }

        #save-csv-btn-id {
            margin: 25px 20px 15px;
        }

        #grid-table-id {
            grid-template-columns: auto 1fr auto auto;
        }

        #eval-error-panel-id {
            margin: 25px 20px 0px;
        }

        #previous-nav-btn-id,
        #next-nav-btn-id {
            padding: 6px;
        }

        #postfix-expr-id,
        #calc-expr-id {
            justify-content: safe center;
            align-items: safe center;
        }

        #postfix-label-id {
            display: none;
            text-align: center;
        }

        #calc-expr-id {
            margin-top: 10px;
            font-size: 1.3rem;
        }
    </style>
</head>

<body>
    <section id="main-section-id" class="content-section active">
        <div class="browse-container">
            <div class="path-container">
                <div id="path-new-btn-id" class="nav-btn enabled">
                    <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                        xml:space="preserve">
                        <path
                            style="fill: none; stroke: black; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-miterlimit: 10"
                            d="M19 3v6h6zH7v26h18V9" />
                    </svg>
                </div>
                <div id="path-label-id" class="path-label"></div>
                <div id="path-refresh-btn-id" class="nav-btn enabled">
                    <svg width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg" viewBox="4 2 17 20">
                        <path
                            d="M12.793 2.293a1 1 0 0 1 1.414 0l3 3a1 1 0 0 1 0 1.414l-3 3a1 1 0 0 1-1.414-1.414L14.086 7H12.5C8.952 7 6 9.952 6 13.5S8.952 20 12.5 20s6.5-2.952 6.5-6.5a1 1 0 1 1 2 0c0 4.652-3.848 8.5-8.5 8.5S4 18.152 4 13.5 7.848 5 12.5 5h1.586l-1.293-1.293a1 1 0 0 1 0-1.414"
                            fill="black"></path>
                    </svg>
                </div>
                <div id="path-close-btn-id" class="nav-btn enabled">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="4 4 16 16">
                        <path
                            style="fill: none; stroke: black; stroke-linecap: round;stroke-linejoin: round; stroke-width: 1.8;"
                            d="M19 19 5 5"></path>
                        <path data-name="primary"
                            style="fill: none; stroke: black; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.8;"
                            d="M19 5 5 19"></path>
                    </svg>
                </div>
            </div>
            <button id="open-csv-btn-id" class="normal-btn">Open a CSV File</button>
        </div>
        <div id="csv-error-panel-id" class="error-panel">
            <div class="error-icon">
                <svg width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg"
                    viewBox="1.65 2.15 20.69 19.85">
                    <path
                        d="M12 14a1 1 0 0 1-1-1v-3a1 1 0 1 1 2 0v3a1 1 0 0 1-1 1m-1.5 2.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0"
                        fill="#470d0d"></path>
                    <path
                        d="M10.23 3.216c.75-1.425 2.79-1.425 3.54 0l8.343 15.852C22.814 20.4 21.85 22 20.343 22H3.657c-1.505 0-2.47-1.6-1.77-2.931zM20.344 20 12 4.147 3.656 20z"
                        fill="#470d0d"></path>
                </svg>
            </div>
            <div class="error-header-container">
                <div class="error-title">
                    <strong>Alert!</strong>
                    <span>One or more parsing issues were found while reading this
                        file:</span>
                </div>
                <ul id="csv-error-list-id" class="error-list"></ul>
            </div>
        </div>
        <div id="table-container-panel-id" class="table-container-panel">
            <button id="save-csv-btn-id" class="normal-btn">Save as a CSV File</button>
            <div id="table-container-id" class="table-container">
                <div id="grid-table-id" class="grid-table">
                    <div class="grid-row">
                        <div class="grid-header">ExprID</div>
                        <div class="grid-header">Expression</div>
                        <div class="grid-header">Type</div>
                        <div class="grid-header">Actions</div>
                    </div>
                </div>
            </div>
            <div class="add-new-entry" id="add-new-entry-id"><span>Add New Entry</span></div>
        </div>
    </section>
    <section id="eval-section-id" class="content-section">
        <div class="header">
            <div class="close-nav-bar">
                <div class="nav-btn enabled" id="close-nav-btn-id">
                    <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="4 4 16 16">
                        <path
                            style="fill: none; stroke: black; stroke-linecap: round;stroke-linejoin: round; stroke-width: 1.8;"
                            d="M19 19 5 5"></path>
                        <path data-name="primary"
                            style="fill: none; stroke: black; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.8;"
                            d="M19 5 5 19"></path>
                    </svg>
                </div>
            </div>
            <div class="nav-bar">
                <div class="nav-btn" id="previous-nav-btn-id">
                    <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="34 80 444 352">
                        <path d="M34 256 210 80l21.21 21.2L91.4 241H478v30H91.4l139.85 139.84L210 432Z"></path>
                    </svg>
                </div>
                <div class="info-bar">
                    <div id="header-id-id"></div>
                    <div class="expr" id="header-expr-id"></div>
                </div>
                <div class="nav-btn flip-icon-horiz" id="next-nav-btn-id">
                    <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="34 80 444 352">
                        <path d="M34 256 210 80l21.21 21.2L91.4 241H478v30H91.4l139.85 139.84L210 432Z"></path>
                    </svg>
                </div>
            </div>
        </div>
        <div id="eval-error-panel-id" class="error-panel">
            <div class="error-icon">
                <svg width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg"
                    viewBox="1.65 2.15 20.69 19.85">
                    <path
                        d="M12 14a1 1 0 0 1-1-1v-3a1 1 0 1 1 2 0v3a1 1 0 0 1-1 1m-1.5 2.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0"
                        fill="#470d0d"></path>
                    <path
                        d="M10.23 3.216c.75-1.425 2.79-1.425 3.54 0l8.343 15.852C22.814 20.4 21.85 22 20.343 22H3.657c-1.505 0-2.47-1.6-1.77-2.931zM20.344 20 12 4.147 3.656 20z"
                        fill="#470d0d"></path>
                </svg>
            </div>
            <div class="error-header-container horiz">
                <strong>Alert!</strong>
                <span id="eval-error-message-id"></span>
            </div>
        </div>
        <div class="divider-container" id="divider-container-id">
            <div class="sizer">
                <div class="internal-divider">
                    <div class="stack-container" id="stack-container-id"></div>
                    <div id="stack-label-id"></div>
                </div>
            </div>
        </div>
        <div class="postfix-expr-container">
            <div id="postfix-label-id">Postfix after conversion:</div>
            <div class="expr" id="postfix-expr-id"></div>
        </div>
        <div class="expr" id="calc-expr-id"></div>
    </section>
    <script>
        const PATH_LABEL_PLACEHOLDER = "Please select a CSV file...";

        const MIN_STACK_SIZE = 4;

        const PRECISION = 4;

        const EXPR_TYPE = Object.freeze({
            Infix: 1,
            Postfix: 2
        });

        const TOKEN_TYPE = Object.freeze({
            Operator: 0,
            Operand: 1
        });

        const mainSection = document.getElementById("main-section-id");

        const pathLabel = document.getElementById("path-label-id");
        const pathNewButton = document.getElementById("path-new-btn-id");
        const pathRefreshButton = document.getElementById("path-refresh-btn-id");
        const pathCloseButton = document.getElementById("path-close-btn-id");
        const saveCSVButton = document.getElementById("save-csv-btn-id");
        const openCSVButton = document.getElementById("open-csv-btn-id");
        const addNewEntryButton = document.getElementById("add-new-entry-id");

        const csvErrorPanel = document.getElementById("csv-error-panel-id");
        const csvErrorList = document.getElementById("csv-error-list-id");

        const tableContainerPanel = document.getElementById("table-container-panel-id");
        const tableContainer = document.getElementById("table-container-id");
        const gridTable = document.getElementById("grid-table-id");

        const headerID = document.getElementById("header-id-id");
        const headerExpr = document.getElementById("header-expr-id");
        const postfixLabel = document.getElementById("postfix-label-id");
        const postfixExpr = document.getElementById("postfix-expr-id");
        const calcExpr = document.getElementById("calc-expr-id");

        const evalErrorPanel = document.getElementById("eval-error-panel-id");
        const evalErrorMessage = document.getElementById("eval-error-message-id");

        const dividerContainer = document.getElementById("divider-container-id");

        const stackContainer = document.getElementById("stack-container-id");
        const stackLabel = document.getElementById("stack-label-id");

        const closeNavButton = document.getElementById("close-nav-btn-id");
        const previousNavButton = document.getElementById("previous-nav-btn-id");
        const nextNavButton = document.getElementById("next-nav-btn-id");

        let exprEntries = null;

        let errorListController, entryTableController;

        let currentExprTokens = null, currentStackState = null, currentIteration, currentPostfixOffset, maxIteration;

        function exprTypeToSpan(type) {
            return `<span class="badge ${type === EXPR_TYPE.Infix ? "infix" : "postfix"}">${type === EXPR_TYPE.Infix ? "Infix" : "Postfix"}</span>`;
        }

        function spanToExprType(span) {
            return span.classList.contains("infix") ? EXPR_TYPE.Infix : EXPR_TYPE.Postfix;
        }

        function swapNodes(node1, node2) {
            const temp = document.createElement("div");
            node1.replaceWith(temp);
            node2.replaceWith(node1);
            temp.replaceWith(node2);
        }

        function swapRows(row1, row2) {
            [row1.className, row2.className] = [row2.className, row1.className];
            swapNodes(row1.children[1], row2.children[1]);
            swapNodes(row1.children[2], row2.children[2]);
        }

        function clearTable() {
            const firstChild = gridTable.firstElementChild;
            gridTable.replaceChildren();
            gridTable.appendChild(firstChild);
            exprEntries = {};
        }

        function openEditMode(row) {
            const exprValue = [...row.children[1].children].map(tok => tok.textContent).join(" ");
            row.children[1].replaceChildren();
            row.children[2].firstElementChild.style.display = "none";
            addNewEntryButton.style.display = "none";
            tableContainer.style.borderRadius = "6px";
            for (let i = 1; i < gridTable.children.length; i++) {
                for (const btn of gridTable.children[i].getElementsByClassName("action-btn"))
                    if (gridTable.children[i] === row && (btn.classList.contains("confirm-action") || btn.classList.contains("cancel-action")))
                        btn.style.display = "flex";
                    else
                        btn.style.display = "none";
                gridTable.children[i].classList.remove("enabled");
            }
            const exprInput = document.createElement("input");
            exprInput.classList.add("normal-input");
            exprInput.placeholder = "Enter expression...";
            exprInput.value = exprValue;
            row.children[1].appendChild(exprInput);
            const typeSelect = document.createElement("select"),
                options = [
                    { label: "Infix", value: EXPR_TYPE.Infix },
                    { label: "Postfix", value: EXPR_TYPE.Postfix }
                ];
            typeSelect.classList.add("normal-select");
            options.forEach(opt => {
                const option = document.createElement("option");
                option.textContent = opt.label;
                option.value = opt.value;
                typeSelect.appendChild(option);
            });
            typeSelect.value = spanToExprType(row.children[2].firstElementChild);
            row.children[2].appendChild(typeSelect);

            exprInput.focus();
            row.addEventListener("keydown", e => {
                if (e.key === "Enter") row.querySelector(".confirm-action").click();
                if (e.key === "Escape") row.querySelector(".cancel-action").click();
            });
        }

        function closeEditMode(row) {
            row.children[1].style.display = row.children[2].firstElementChild.style.display = "inline";
            addNewEntryButton.style.display = tableContainer.style.borderRadius = "";
            for (let i = 1; i < gridTable.children.length; i++) {
                for (const btn of gridTable.children[i].getElementsByClassName("action-btn"))
                    if (btn.classList.contains("confirm-action") || btn.classList.contains("cancel-action"))
                        btn.style.display = "none";
                    else
                        btn.style.display = "flex";
                gridTable.children[i].classList.add("enabled");
            }
            row.children[1].removeChild(row.children[1].lastElementChild);
            row.children[2].removeChild(row.children[2].lastElementChild);
        }

        function showSection(sectionID) {
            const currentSection = document.querySelector(".content-section.active"),
                nextSection = document.getElementById(sectionID);

            if (currentSection.id === sectionID) return;

            currentSection.classList.remove("active");

            setTimeout(() => nextSection.classList.add("active"), 400);
        }

        function parseOperand(operand) {
            if (operand === "nan") return "NaN";
            if (operand === "+inf") return "+∞";
            if (operand === "-inf") return "-∞";

            return +operand.toFixed(PRECISION);
        }

        async function createRow(entryObj, isInsert, isAddActionEnabled, isMoveUpEnabled, isMoveDownEnabled) {
            const tableRow = document.createElement("div");
            tableRow.classList.add("grid-row", "enabled", isInsert || await window.validate_expression(entryObj) ? "normal" : "error");
            if (isInsert) tableRow.classList.add("inserted");
            tableRow.addEventListener("click", rowSelect);
            const addActionEnabled = isAddActionEnabled ? "enabled" : "",
                moveUpEnabled = isMoveUpEnabled ? "enabled" : "",
                moveDownEnabled = isMoveDownEnabled ? "enabled" : "";
            tableRow.innerHTML = `<div class="grid-cell center-cell"><strong>${entryObj.id}</strong></div><div class="grid-cell"><div class="expr"></div></div><div class="grid-cell center-cell">${exprTypeToSpan(entryObj.type)}</div><div class="grid-cell center-cell"><div class="actions-container"><div class="action-btn move-up-action ${moveUpEnabled}"><svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m13 30 12-12 12 12" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="action-btn move-down-action ${moveDownEnabled}"><svg style="transform: rotate(180deg);" width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m13 30 12-12 12 12" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="action-btn add-action ${addActionEnabled}"><svg width="28" height="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14m-7-7v14" style="fill: none; stroke: #fff; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;"/></svg></div><div class="action-btn edit-action"><svg style="padding: 4px;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></div><div class="action-btn delete-action"><svg width="28" height="28" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.937 4.5H8.062A2.003 2.003 0 0 1 10 2a2.003 2.003 0 0 1 1.937 2.5" fill="#fff"/><path d="M4.5 5.5a1 1 0 0 1 0-2h11a1 1 0 1 1 0 2z" fill="#fff"/><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 18.5a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-9a1 1 0 0 0-1 1v10.5a1 1 0 0 0 1 1zm-2-10a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0zM10 8a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 1 0v-7A.5.5 0 0 0 10 8m-3.5.5a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0z" fill="#fff"/></svg></div><div class="action-btn confirm-action" style="display: none;"><svg width="28" height="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path style="fill: none; stroke: #fff; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;" d="m5 12 5 5 9-9"/></svg></div><div class="action-btn cancel-action" style="display: none;"><svg width="28" height="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path style="fill: none; stroke: #fff; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;" d="M19 19 5 5m14 0L5 19"/></svg></div></div></div>`;
            if (entryObj.expr)
                entryObj.expr.forEach(token => {
                    const tokenElement = document.createElement("strong");
                    tokenElement.textContent = token.token;
                    tokenElement.classList.add(token.type === TOKEN_TYPE.Operator ? "token-operator" : "token-operand");
                    tableRow.children[1].appendChild(tokenElement);
                });
            return tableRow;
        }

        async function rowSelect(e) {
            const selectedRow = e.target.closest(".grid-row"),
                nextRow = selectedRow.nextElementSibling,
                previousRow = selectedRow.previousElementSibling;
            let elem;
            if (elem = e.target.closest(".move-up-action")) {
                if (elem.classList.contains("enabled")) swapRows(selectedRow, previousRow);
            } else if (elem = e.target.closest(".move-down-action")) {
                if (elem.classList.contains("enabled")) swapRows(selectedRow, nextRow);
            } else if (elem = e.target.closest(".add-action")) {
                if (elem.classList.contains("enabled")) {
                    const newRow = await createRow({
                        id: parseInt(selectedRow.children[0].textContent) - 1,
                        expr: null,
                        type: EXPR_TYPE.Infix
                    }, true, false, false, false);
                    gridTable.insertBefore(newRow, selectedRow);
                    selectedRow.firstElementChild.scrollIntoView({
                        behavior: "smooth",
                        block: "start",
                        inline: "nearest"
                    });
                    openEditMode(newRow);
                }
            } else if (elem = e.target.closest(".edit-action")) {
                selectedRow.firstElementChild.scrollIntoView({
                    behavior: "smooth",
                    block: "start",
                    inline: "nearest"
                });
                openEditMode(selectedRow);
            } else if (elem = e.target.closest(".delete-action")) {
                if (previousRow === gridTable.firstElementChild && nextRow) nextRow.querySelector(".move-up-action").classList.remove("enabled");
                else if (!nextRow && previousRow !== gridTable.firstElementChild) previousRow.querySelector(".move-down-action").classList.remove("enabled");
                if (nextRow) nextRow.querySelector(".add-action").classList.add("enabled");
                exprEntries[selectedRow.children[0].textContent] = null;
                selectedRow.parentElement.removeChild(selectedRow);
            } else if (elem = e.target.closest(".confirm-action")) {
                const exprObj = {
                    id: parseInt(selectedRow.children[0].textContent),
                    expr: await window.tokenize_expression(selectedRow.children[1].lastElementChild.value),
                    type: parseInt(selectedRow.children[2].lastElementChild.value)
                };
                closeEditMode(selectedRow);
                selectedRow.classList.remove("normal", "error", "inserted");
                selectedRow.classList.add(await window.validate_expression(exprObj) ? "normal" : "error");
                selectedRow.children[1].replaceChildren();
                exprObj.expr.forEach(token => {
                    const tokenElement = document.createElement("strong");
                    tokenElement.textContent = token.token;
                    tokenElement.classList.add(token.type === TOKEN_TYPE.Operator ? "token-operator" : "token-operand");
                    selectedRow.children[1].appendChild(tokenElement);
                });
                selectedRow.children[2].innerHTML = exprTypeToSpan(exprObj.type);
                exprEntries[selectedRow.children[0].textContent] = exprObj;
                if (nextRow) {
                    selectedRow.querySelector(".move-down-action").classList.add("enabled");
                    if (previousRow === gridTable.firstElementChild) nextRow.querySelector(".move-up-action").classList.add("enabled");
                    else selectedRow.querySelector(".move-up-action").classList.add("enabled");
                    nextRow.querySelector(".add-action").classList.remove("enabled");
                } else if (previousRow !== gridTable.firstElementChild && !nextRow) {
                    previousRow.querySelector(".move-down-action").classList.add("enabled");
                    selectedRow.querySelector(".move-up-action").classList.add("enabled");
                }
                if ((previousRow === gridTable.firstElementChild && parseInt(selectedRow.children[0].textContent) > 1) ||
                    parseInt(selectedRow.children[0].textContent) - 1 > parseInt(previousRow.children[0].textContent)) {
                    selectedRow.querySelector(".add-action").classList.add("enabled");
                }
            } else if (elem = e.target.closest(".cancel-action")) {
                closeEditMode(selectedRow);
                if (selectedRow.classList.contains("inserted")) gridTable.removeChild(selectedRow);
                else {
                    exprEntries[selectedRow.children[0].textContent].expr.forEach(token => {
                        const tokenElement = document.createElement("strong");
                        tokenElement.textContent = token.token;
                        tokenElement.classList.add(token.type === TOKEN_TYPE.Operator ? "token-operator" : "token-operand");
                        selectedRow.children[1].appendChild(tokenElement);
                    });
                }
            } else if (selectedRow.classList.contains("enabled")) {
                const expr = selectedRow.children[1].textContent,
                    type = spanToExprType(selectedRow.children[2].firstElementChild);

                currentExprTokens = exprEntries[selectedRow.children[0].textContent].expr;
                currentStackState = await window.evaluate_expression({
                    expr: currentExprTokens,
                    type: type
                });
                currentIteration = -1;

                headerID.textContent = `${selectedRow.children[0].textContent}.`;
                headerExpr.replaceChildren();
                currentExprTokens.forEach(token => {
                    const tokenElement = document.createElement("strong");
                    tokenElement.textContent = token.token;
                    tokenElement.classList.add(token.type === TOKEN_TYPE.Operator ? "token-operator" : "token-operand");
                    headerExpr.appendChild(tokenElement);
                });

                if (currentStackState.message.length === 0) {
                    if (type === EXPR_TYPE.Infix) {
                        currentPostfixOffset = currentStackState.infix_op_stack_hist.length;
                        maxIteration = currentStackState.infix_op_stack_hist.length + currentStackState.postfix_op_hist.length;
                    } else {
                        currentPostfixOffset = 0;
                        maxIteration = currentStackState.postfix_op_hist.length;
                    }

                    const infixMaxStackSize = currentStackState.max_infix_stack_size || 0,
                        postfixMaxStackSize = currentStackState.max_postfix_stack_size || 0,
                        stackSize = Math.max(infixMaxStackSize, postfixMaxStackSize, MIN_STACK_SIZE);

                    stackContainer.replaceChildren();
                    for (let i = 0; i < stackSize; i++) {
                        const stackElement = document.createElement("div");
                        stackElement.textContent = "(null)";
                        stackElement.classList.add("stack", "invisible");
                        stackContainer.appendChild(stackElement);
                    }

                    dividerContainer.classList.add("show");
                    evalErrorPanel.classList.remove("show");
                    previousNavButton.classList.remove("enabled");
                    nextNavButton.classList.add("enabled");
                } else {
                    evalErrorMessage.textContent = currentStackState.message;

                    dividerContainer.classList.remove("show");
                    evalErrorPanel.classList.add("show");
                    nextNavButton.classList.remove("enabled");
                }

                showSection("eval-section-id");
            }
        }

        async function appendEntry() {
            const lastRow = gridTable.lastElementChild,
                newRow = await createRow({
                    id: lastRow === gridTable.firstElementChild ? 1 : parseInt(lastRow.children[0].textContent) + 1,
                    expr: null,
                    type: EXPR_TYPE.Infix
                }, true, false, false, false);
            gridTable.appendChild(newRow);
            mainSection.scrollTo({
                top: mainSection.scrollHeight,
                behavior: "smooth"
            });
            openEditMode(newRow);
        }

        async function updateErrorList(csvObject) {
            if (errorListController) errorListController.abort();

            errorListController = new AbortController();

            csvErrorList.replaceChildren();
            const fragment = document.createDocumentFragment();
            for (const message of csvObject.csv_messages) {
                if (errorListController.signal.aborted) break;
                const listItem = document.createElement("li");
                listItem.textContent = message;
                fragment.appendChild(listItem);
            }
            csvErrorList.appendChild(fragment);

            if (csvObject.csv_messages.length === 0) csvErrorPanel.classList.remove("show");
            else csvErrorPanel.classList.add("show");
        }

        async function updateEntryTable(csvObject) {
            if (entryTableController) entryTableController.abort();

            entryTableController = new AbortController();

            clearTable();
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < csvObject.entries.length; i++) {
                const entryObj = {
                    id: csvObject.entries[i].id,
                    type: csvObject.entries[i].type,
                    expr: await window.tokenize_expression(csvObject.entries[i].expr)
                };
                const row = await createRow(entryObj, false, csvObject.entries[i].id > 1 && (i === 0 || csvObject.entries[i].id - 1 > csvObject.entries[i - 1].id), i > 0, i < csvObject.entries.length - 1);
                if (entryTableController.signal.aborted) break;
                fragment.appendChild(row);
                exprEntries[row.children[0].textContent] = entryObj;
            }
            gridTable.appendChild(fragment);
            tableContainerPanel.style.display = "flex";
        }

        async function refreshCSV(path) {
            try {
                const csvObject = await window.read_csv_file(path);
                pathRefreshButton.style.display = "inline";
                pathCloseButton.style.display = "inline";
                tableContainerPanel.style.display = "";
                updateErrorList(csvObject);
                updateEntryTable(csvObject);
                return true;
            } catch (_) {
                return false;
            }
        }

        async function writeCSV(path) {
            try {
                pathRefreshButton.style.display = "inline";
                const entries = [];
                for (let i = 1; i < gridTable.children.length; i++)
                    entries.push({
                        id: parseInt(gridTable.children[i].children[0].textContent),
                        expr: gridTable.children[i].children[1].textContent,
                        type: gridTable.children[i].children[2].textContent
                    });
                await window.write_csv_file({
                    path: path,
                    entries: entries
                });
                return true;
            } catch (_) {
                return false;
            }
        }

        async function loadCSV() {
            const path = await window.open_csv_file();
            if (path.length !== 0 && await refreshCSV(path)) pathLabel.textContent = path;
        }

        async function saveCSV() {
            const path = await window.save_csv_file();
            if (path.length !== 0 && await writeCSV(path)) pathLabel.textContent = path;
        }

        async function updateStack() {
            let i;
            if (currentIteration === maxIteration) {
                previousNavButton.classList.add("enabled");
                nextNavButton.classList.remove("enabled");
                const exprSource = currentPostfixOffset === 0 ? headerExpr : postfixExpr;
                exprSource.lastElementChild.classList.remove("token-highlight");
                stackContainer.firstElementChild.classList.add("invisible");
                calcExpr.innerHTML = `<span>Evaluation Result:</span><strong class="token token-operand">${parseOperand(currentStackState.res)}</strong>`;
            } else {
                nextNavButton.classList.add("enabled");
                postfixLabel.style.display = currentIteration === currentPostfixOffset - 1 ? "inline" : "";
                if (currentIteration === -1) {
                    previousNavButton.classList.remove("enabled");
                    headerExpr.firstElementChild.classList.remove("token-highlight");
                    postfixExpr.replaceChildren();
                    i = 0;
                } else {
                    previousNavButton.classList.add("enabled");
                    if (currentPostfixOffset !== 0 && currentIteration < currentPostfixOffset) {
                        // Infix code
                        if (currentIteration !== 0) headerExpr.children[currentIteration - 1].classList.remove("token-highlight");
                        if (currentIteration !== currentPostfixOffset - 1) headerExpr.children[currentIteration].classList.add("token-highlight");
                        if (currentIteration < currentPostfixOffset - 2) headerExpr.children[currentIteration + 1].classList.remove("token-highlight");

                        const currentInfixOpStack = currentStackState.infix_op_stack_hist[currentIteration];
                        for (i = 0; i < currentInfixOpStack.length; i++) {
                            stackContainer.children[i].textContent = currentInfixOpStack[i];
                            stackContainer.children[i].classList.remove("invisible");
                        };

                        postfixExpr.replaceChildren();
                        currentStackState.postfix_hist[currentIteration].forEach(token => {
                            const tokenElement = document.createElement("strong");
                            tokenElement.textContent = token.token;
                            tokenElement.classList.add(token.type === TOKEN_TYPE.Operator ? "token-operator" : "token-operand");
                            postfixExpr.appendChild(tokenElement);
                        });

                        if (currentIteration === currentPostfixOffset - 1) postfixExpr.firstElementChild.classList.remove("token-highlight");
                    } else {
                        // Postfix code
                        const offsettedIteration = currentIteration - currentPostfixOffset,
                            exprSource = currentPostfixOffset === 0 ? headerExpr : postfixExpr;
                        if (offsettedIteration !== 0) exprSource.children[offsettedIteration - 1].classList.remove("token-highlight");
                        exprSource.children[offsettedIteration].classList.add("token-highlight");
                        if (offsettedIteration < maxIteration - currentPostfixOffset - 1) exprSource.children[offsettedIteration + 1].classList.remove("token-highlight");

                        const currentNumberStack = currentStackState.number_stack_hist[offsettedIteration];
                        for (i = 0; i < currentNumberStack.length; i++) {
                            stackContainer.children[i].textContent = parseOperand(currentNumberStack[i]);
                            stackContainer.children[i].classList.remove("invisible");
                        }

                        const previousNumberStack = currentStackState.number_stack_hist[offsettedIteration - 1],
                            currentOp = currentStackState.postfix_op_hist[offsettedIteration],
                            result = parseOperand(currentNumberStack[currentNumberStack.length - 1]);
                        if (currentOp === " ")
                            calcExpr.innerHTML = "";
                        else if (currentOp === "~") {
                            const operand1 = parseOperand(previousNumberStack[previousNumberStack.length - 1]);
                            calcExpr.innerHTML = `<span>[</span><strong style="transform: rotate(180deg);">∴</strong><strong class="token token-operator">${currentOp}</strong><strong class="token token-operand">${operand1}</strong><strong>=</strong><strong class="token token-operand">${result}</strong><span>]</span>`;
                        }
                        else {
                            const operand1 = parseOperand(previousNumberStack[previousNumberStack.length - 2]),
                                operand2 = parseOperand(previousNumberStack[previousNumberStack.length - 1]);
                            calcExpr.innerHTML = `<span>[</span><strong style="transform: rotate(180deg);">∴</strong><strong class="token token-operand">${operand1}</strong><strong class="token token-operator">${currentOp}</strong><strong class="token token-operand">${operand2}</strong><strong>=</strong><strong class="token token-operand">${result}</strong><span>]</span>`;
                        }
                    }
                }
                while (i < stackContainer.children.length) {
                    stackContainer.children[i].classList.add("invisible");
                    i++;
                }
            }
        }

        pathLabel.addEventListener("click", loadCSV);

        pathNewButton.addEventListener("click", () => {
            pathLabel.textContent = "<Unsaved>";
            clearTable();
            csvErrorPanel.classList.remove("show");
            pathRefreshButton.style.display = "none";
            pathCloseButton.style.display = "inline";
            tableContainerPanel.style.display = "flex";
        });

        pathRefreshButton.addEventListener("click", () => refreshCSV(pathLabel.textContent));

        pathCloseButton.addEventListener("click", () => {
            pathLabel.textContent = PATH_LABEL_PLACEHOLDER;
            clearTable();
            csvErrorPanel.classList.remove("show");
            pathRefreshButton.style.display = "none";
            pathCloseButton.style.display = "none";
            tableContainerPanel.style.display = "none";
        });

        openCSVButton.addEventListener("click", loadCSV);
        saveCSVButton.addEventListener("click", saveCSV);

        addNewEntryButton.addEventListener("click", appendEntry);

        closeNavButton.addEventListener("click", () => {
            calcExpr.innerHTML = "";
            postfixExpr.replaceChildren();
            currentExprTokens = currentStackState = null;
            showSection("main-section-id");
        });

        previousNavButton.addEventListener("click", () => {
            if (currentIteration !== -1) {
                currentIteration--;
                updateStack();
            }
        });

        nextNavButton.addEventListener("click", () => {
            if (nextNavButton.classList.contains("enabled") && currentIteration !== maxIteration) {
                currentIteration++;
                updateStack();
            }
        });

        pathLabel.textContent = PATH_LABEL_PLACEHOLDER;

        document.oncontextmenu = document.body.oncontextmenu = () => false;
    </script>
</body>

</html>
